<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2350 1300" font-family="Inter, Arial, sans-serif">
  <rect x="0" y="0" width="2350" height="1300" fill="#ffffff"/>

  <text x="1175" y="38" text-anchor="middle" font-size="24" font-weight="800" fill="#0d2c54">DER — Sistema de Gestión Gladys Traveltur (esquema completo)</text>
  <text x="1175" y="60" text-anchor="middle" font-size="13" fill="#6b7280">Notación relacional + Modelo Entidad-Relación real (Supabase / PostgreSQL)</text>

  <!-- PANEL IZQUIERDO — NOTACIÓN RELACIONAL -->
  <g font-size="12.5">
    <text x="30" y="100" font-size="15" font-weight="800" fill="#0d2c54">Notación Relacional</text>

    <text x="30" y="130" font-weight="800" fill="#0d2c54">CLIENTES</text>
    <text x="30" y="149" fill="#1a202c"><tspan font-weight="700" text-decoration="underline">PK:</tspan> id_cliente</text>
    <text x="30" y="167" fill="#1a202c"><tspan font-weight="700">FK:</tspan> (ninguna)</text>
    <text x="30" y="185" fill="#1a202c">Otros: dni, nombre, apellido, teléfono, fecha_registro</text>

    <text x="30" y="217" font-weight="800" fill="#0d2c54">DESTINOS</text>
    <text x="30" y="236" fill="#1a202c"><tspan font-weight="700" text-decoration="underline">PK:</tspan> id_destino</text>
    <text x="30" y="254" fill="#1a202c"><tspan font-weight="700">FK:</tspan> (ninguna)</text>
    <text x="30" y="272" fill="#1a202c">Otros: nombre, ubicación, descripción, imagen_url</text>

    <text x="30" y="304" font-weight="800" fill="#0d2c54">EMPRESAS</text>
    <text x="30" y="323" fill="#1a202c"><tspan font-weight="700" text-decoration="underline">PK:</tspan> id_empresa</text>
    <text x="30" y="341" fill="#1a202c"><tspan font-weight="700">FK:</tspan> (ninguna)</text>
    <text x="30" y="359" fill="#1a202c">Otros: nombre</text>

    <text x="30" y="391" font-weight="800" fill="#0d2c54">SALIDAS</text>
    <text x="30" y="410" fill="#1a202c"><tspan font-weight="700" text-decoration="underline">PK:</tspan> id_salida</text>
    <text x="30" y="428" fill="#1a202c"><tspan font-weight="700" font-style="italic">FK:</tspan> <tspan font-style="italic" font-weight="700">id_destino</tspan>, <tspan font-style="italic" font-weight="700">id_empresa</tspan></text>
    <text x="30" y="446" fill="#1a202c">Otros: fecha_salida, fecha_regreso, duración_días,</text>
    <text x="30" y="463" fill="#1a202c">duración_noches, precio_total, moneda, tipo_viaje,</text>
    <text x="30" y="480" fill="#1a202c">bus_piso_preferencia, activo, vendidos, promo, incluye</text>

    <text x="30" y="512" font-weight="800" fill="#0d2c54">RESERVAS</text>
    <text x="30" y="531" fill="#1a202c"><tspan font-weight="700" text-decoration="underline">PK:</tspan> id_reserva</text>
    <text x="30" y="549" fill="#1a202c"><tspan font-weight="700" font-style="italic">FK:</tspan> <tspan font-style="italic" font-weight="700">id_cliente</tspan>, <tspan font-style="italic" font-weight="700">id_salida</tspan></text>
    <text x="30" y="567" fill="#1a202c">Otros: cantidad_pasajeros, monto_total, monto_pagado,</text>
    <text x="30" y="584" fill="#1a202c">estado_pago, estado, fecha_reserva, notas, promo</text>

    <text x="30" y="616" font-weight="800" fill="#4b5563">USUARIOS <tspan font-size="10.5" font-weight="500" font-style="italic" fill="#9ca3af">(independiente)</tspan></text>
    <text x="30" y="635" fill="#1a202c"><tspan font-weight="700" text-decoration="underline">PK:</tspan> id_usuario</text>
    <text x="30" y="653" fill="#1a202c"><tspan font-weight="700">FK:</tspan> (ninguna)</text>
    <text x="30" y="671" fill="#1a202c">Otros: nombre, correo_electrónico, hash_contraseña, es_admin</text>
  </g>

