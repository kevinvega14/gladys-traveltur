    <text x="30" y="738" fill="#1a202c"><tspan font-weight="700" text-decoration="underline">PK</tspan> = Clave primaria &#160;&#160;&#160; <tspan font-weight="700" font-style="italic">FK</tspan> = Clave foránea</text>
  </g>

