<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
    :root {

    * { box-sizing: border-box; }

    body {
        background: var(--fondo);

        margin: 0;
        color: #1a202c;
        -webkit-font-smoothing: antialiased;
    }

    .hero {
    background-image: linear-gradient(rgba(0, 51, 153, 0.6), rgba(0, 40, 120, 0.8)), url('https://images.unsplash.com/photo-1488646953014-85cb44e25828?w=1600&q=80');

<body>
    <div class="hero"><h1>GLADYS TRAVELTUR</h1><p>Tu próxima aventura comienza aquí</p></div>
    <div class="controles">
        <div class="campo">¿A dónde? <input type="text" id="bus-txt" onkeyup="filtrar()"></div>
        <div class="campo">Desde <input type="date" id="f-desde" onchange="filtrar()"></div>
        <div class="campo">Hasta <input type="date" id="f-hasta" onchange="filtrar()"></div>
        <div class="campo">Ordenar <select id="orden" onchange="filtrar()"><option value="prox">Próximos</option><option value="p-menor">Menor Precio</option></select></div>
        <button class="btn-bus" onclick="filtrar()">BUSCAR</button>
    </div>
    <div class="categorias-bar" id="categorias-bar">
    <button class="cat-btn active" data-cat="todos"><span class="cat-icon">🌎</span><span class="cat-label">Todos</span></button>
    <button class="cat-btn" data-cat="promo"><span class="cat-icon">🚨</span><span class="cat-label">Promos</span></button>
    <button class="cat-btn" data-cat="micro"><span class="cat-icon">🚌</span><span class="cat-label">Micros</span></button>
    <button class="cat-btn" data-cat="vuelo"><span class="cat-icon">✈️</span><span class="cat-label">Vuelos</span></button>
    <button class="cat-btn" data-cat="escapada"><span class="cat-icon">🏔️</span><span class="cat-label">Escapadas</span></button>
    <button class="cat-btn" data-cat="playa"><span class="cat-icon">🏖️</span><span class="cat-label">Playa</span></button>
</div>

<h2 class="section-title" id="resultados-title">Todas las ofertas</h2>
<div class="container" id="resultados"></div>

    <script>
        const API = 'http://localhost:4000';
        const FOTO_DEFAULT = "https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=600";
        const fotos = { "bariloche": "Fondos/bariloche.jpg", "brasil": "Fondos/brasil.jpg", "carlos paz": "Fondos/carlospaz.jpg", "cataratas del iguazú": "Fondos/cataratas.jpg", "jujuy": "Fondos/jujuy.jpg", "mendoza": "Fondos/mendoza.jpg", "default": FOTO_DEFAULT };

        let cache = [];
        const norm = (t) => (t||"").normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase();

        async function cargar() {
            try {
                const res = await fetch(`${API}/admin/ranking`);
                const all = await res.json();
                cache = all.filter(v => v.activo && v.destinos); // Solo activos y con destino válido
                filtrar();
            } catch (e) { console.error(e); }
        }

        const MESES_LARGO = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];


function formatoCorto(fecha) {
    const d = new Date(fecha + 'T00:00:00');
    return `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}`;
}

function etiquetaFecha(v) {
    const salida = new Date(v.fecha_salida + 'T00:00:00');
    const mesLargo = MESES_LARGO[salida.getMonth()];

    if (v.fecha_regreso && v.fecha_regreso !== v.fecha_salida) {
        const regreso = new Date(v.fecha_regreso + 'T00:00:00');
        const noches = Math.round((regreso - salida) / (1000 * 60 * 60 * 24));
        if (noches > 0) {
            return `Del ${formatoCorto(v.fecha_salida)} al ${formatoCorto(v.fecha_regreso)} (${noches} noche${noches > 1 ? 's' : ''}) · ${mesLargo}`;
        }
    }
    return `Salida: ${formatoCorto(v.fecha_salida)} · ${mesLargo}`;
}
// Lista de mantenimiento manual — sumá acá los destinos de playa que vayas cargando
// y que no se estén detectando (mientras no exista un campo real de categoría en Supabase)
const DESTINOS_PLAYA = [
    'mar del plata', 'pinamar', 'villa gesell', 'necochea', 'miramar',
    'brasil', 'florianopolis', 'camboriu', 'punta cana', 'cancun',
    'rio de janeiro', 'buzios', 'maragogi'
];

const LABELS_CATEGORIA = {
    todos: 'Todas las ofertas',
    micro: '🚌 Salidas en Micro',
    vuelo: '✈️ Paquetes Aéreos',
    escapada: '🏔️ Escapadas cortas',
    playa: '🏖️ Destinos de Playa',
    promo: '🚨 Promos Imperdibles'
};

// Deduce a qué categorías pertenece un viaje (puede pertenecer a más de una)
function categoriasDe(v) {
    const cats = [];
    const tipo = norm(v.tipo_viaje);
    if (tipo.includes('micro')) cats.push('micro');
    if (tipo.includes('aer')) cats.push('vuelo');

    const destino = norm(v.destinos.nombre);
    if (DESTINOS_PLAYA.some(k => destino.includes(k))) cats.push('playa');

    if (v.fecha_regreso && v.fecha_regreso !== v.fecha_salida) {
        const noches = Math.round((new Date(v.fecha_regreso) - new Date(v.fecha_salida)) / (1000 * 60 * 60 * 24));
        if (noches > 0 && noches <= 3) cats.push('escapada');
    }
    if (v.promo) cats.push('promo');

    return cats;
}

let categoriaActiva = 'todos';

document.querySelectorAll('.cat-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        categoriaActiva = btn.dataset.cat;
        document.getElementById('resultados-title').innerText = LABELS_CATEGORIA[categoriaActiva];
        filtrar();
    });
});

function filtrar() {
    const txt = norm(document.getElementById('bus-txt').value);
    const ord = document.getElementById('orden').value;
    const desde = document.getElementById('f-desde').value;
    const hasta = document.getElementById('f-hasta').value;

    let list = cache.filter(v => norm(v.destinos.nombre).includes(txt));
    if (desde) list = list.filter(v => v.fecha_salida >= desde);
    if (hasta) list = list.filter(v => v.fecha_salida <= hasta);
    if (categoriaActiva !== 'todos') {
        list = list.filter(v => categoriasDe(v).includes(categoriaActiva));
    }
    if (ord === "p-menor") list.sort((a, b) => a.precio_total - b.precio_total);
    if (ord === "prox") list.sort((a, b) => new Date(a.fecha_salida) - new Date(b.fecha_salida));

    dibujar(list, 'resultados');
}

function dibujar(lista, id) {
    const cont = document.getElementById(id);
    cont.innerHTML = lista.length === 0 ? "<p class='empty'>No hay ofertas por el momento.</p>" : lista.map(v => `
        <div class="card">
            <div class="card-img-wrap">
                <img src="${imagenDe(v)}" class="card-img" onerror="this.onerror=null;this.src='${FOTO_DEFAULT}'">
                <span class="card-tag">${etiquetaFecha(v)}</span>
                ${v.promo ? `<span class="card-promo-badge">🚨 ${v.promo}</span>` : ''}
            </div>
            <div class="card-body">
                <h3>${v.destinos.nombre}</h3>
                <div class="empresa">${v.empresas ? v.empresas.nombre : ''}</div>
                <div class="price">${v.moneda === 'USD' ? 'USD' : '$'} ${Number(v.precio_total).toLocaleString('es-AR')}</div>
                <a href="https://wa.me/5491135592160?text=${encodeURIComponent('Hola Gladys! Consulto por ' + v.destinos.nombre)}" class="btn-wa" target="_blank">Consultar</a>
            </div>
        </div>`).join('');
}

        function imagenDe(v) {
            if (v.destinos.imagen_url) return v.destinos.imagen_url;
            return fotos[norm(v.destinos.nombre)] || FOTO_DEFAULT;
        }

        
        window.onload = cargar;


</script>

<!-- 2. Acá ABRIMOS un nuevo bloque para meter la lógica de JavaScript -->
<script>
    // ------------------ CHATBOT ------------------
    let chatHistorial = [];
    let chatAbiertoUnaVez = false;

    function toggleChat() {
        const widget = document.getElementById('chat-widget');
        widget.classList.toggle('abierto');
        if (widget.classList.contains('abierto') && !chatAbiertoUnaVez) {
            chatAbiertoUnaVez = true;
            agregarBurbuja('¡Hola! 👋 Soy el asistente virtual de Gladys Traveltur. Contame qué destino tenés en mente y te cuento las salidas disponibles.', 'bot');
        }
    }

    function agregarBurbuja(texto, role) {
        const cont = document.getElementById('chat-messages');
        const div = document.createElement('div');
        div.className = `chat-msg ${role}`;
        div.innerText = texto;
        cont.appendChild(div);
        cont.scrollTop = cont.scrollHeight;
    }

    async function enviarMensajeChat() {
        const input = document.getElementById('chat-input');
        const texto = input.value.trim();
        if (!texto) return;

        agregarBurbuja(texto, 'user');
        input.value = '';

        const historialPrevio = [...chatHistorial];
        chatHistorial.push({ role: 'user', text: texto });

        const typing = document.getElementById('chat-typing');
        typing.classList.add('visible');

        try {
            const res = await fetch(`${API}/api/chat`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: texto, history: historialPrevio })
            });
            const data = await res.json();
            typing.classList.remove('visible');

            if (!res.ok) {
                agregarBurbuja('Uy, tuve un problema para responder. ¿Podés intentar de nuevo en un momento?', 'bot');
                return;
            }
            agregarBurbuja(data.reply, 'bot');
            chatHistorial.push({ role: 'bot', text: data.reply });
        } catch (e) {
            typing.classList.remove('visible');
            agregarBurbuja('No pude conectarme con el servidor. Probá de nuevo en un momento.', 'bot');
        }
    }

    document.getElementById('chat-toggle').addEventListener('click', toggleChat);
    document.getElementById('chat-close').addEventListener('click', toggleChat);
    document.getElementById('chat-send').addEventListener('click', enviarMensajeChat);
    document.getElementById('chat-input').addEventListener('keyup', e => { if (e.key === 'Enter') enviarMensajeChat(); });
</script>

</body>
</html>
