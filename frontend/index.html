<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gladys Traveltur - Ofertas 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
    :root {
        --azul: #0d2c54;
        --celeste: #3182ce;
        --verde: #16a34a;
        --fondo: #f7f8fa;
        --card: #ffffff;
        --borde: #eef0f3;
        --texto-sec: #6b7280;
        --sombra: 0 20px 50px -20px rgba(13,44,84,0.18);
        --sombra-hover: 0 24px 60px -18px rgba(13,44,84,0.28);
    }

    * { box-sizing: border-box; }

    body {
        background: var(--fondo);
        font-family: 'Inter', sans-serif;
        margin: 0;
        color: #1a202c;
        -webkit-font-smoothing: antialiased;
    }

    .hero {
        background: linear-gradient(rgba(13,44,84,0.72), rgba(13,44,84,0.72)), url('Fondos/bariloche.jpg') center/cover;
        padding: 100px 20px 130px;
        text-align: center;
        color: white;
    }
    .hero h1 {
        margin: 0;
        font-size: clamp(32px, 5vw, 44px);
        font-weight: 900;
        letter-spacing: -0.02em;
        text-transform: uppercase;
    }
    .hero p {
        margin: 10px 0 0;
        font-size: 15px;
        font-weight: 500;
        color: rgba(255,255,255,0.85);
    }

    .controles {
        background: var(--card);
        width: 92%;
        max-width: 1020px;
        margin: -60px auto 50px;
        padding: 26px;
        border-radius: 20px;
        box-shadow: var(--sombra);
        border: 1px solid var(--borde);
        display: flex;
        flex-wrap: wrap;
        gap: 16px;
        justify-content: center;
        align-items: flex-end;
    }

    .campo {
        display: flex;
        flex-direction: column;
        gap: 7px;
        font-size: 11px;
        font-weight: 700;
        color: var(--texto-sec);
        text-transform: uppercase;
        letter-spacing: 0.04em;
    }

    input, select {
        padding: 12px 14px;
        border-radius: 10px;
        border: 1px solid var(--borde);
        font-family: inherit;
        font-size: 14px;
        background: #fbfbfc;
        transition: border-color .15s ease, box-shadow .15s ease;
        min-width: 150px;
    }
    input:focus, select:focus {
        outline: none;
        border-color: var(--celeste);
        box-shadow: 0 0 0 3px rgba(49,130,206,0.15);
        background: white;
    }

    .btn-bus {
        background: var(--azul);
        color: white;
        border: none;
        padding: 13px 28px;
        border-radius: 10px;
        font-weight: 700;
        font-size: 13px;
        cursor: pointer;
        transition: transform .15s ease, background .15s ease;
    }
    .btn-bus:hover { background: var(--celeste); transform: translateY(-1px); }

    .section-title {
        text-align: center;
        font-size: 22px;
        color: var(--azul);
        font-weight: 900;
        letter-spacing: -0.01em;
        margin: 60px 0 28px;
    }

    .container {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
        gap: 24px;
        max-width: 1200px;
        margin: auto;
        padding: 0 24px 60px;
    }

    .card {
        background: var(--card);
        border-radius: 18px;
        overflow: hidden;
        border: 1px solid var(--borde);
        box-shadow: 0 2px 8px rgba(13,44,84,0.05);
        transition: transform .2s ease, box-shadow .2s ease;
    }
    .card:hover {
        transform: translateY(-6px);
        box-shadow: var(--sombra-hover);
    }

    .card-img { width: 100%; height: 190px; object-fit: cover; background: #e2e8f0; display: block; }

    .card-body { padding: 22px; }
    .card-body h3 {
        margin: 6px 0 2px;
        text-transform: uppercase;
        font-size: 17px;
        font-weight: 800;
        color: var(--azul);
        letter-spacing: -0.01em;
    }
    .card-body .empresa {
        font-size: 11px;
        color: #a0aec0;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.04em;
    }

    .price {
        font-size: 24px;
        font-weight: 900;
        color: #1a202c;
        margin-top: 12px;
        letter-spacing: -0.02em;
    }

    .btn-wa {
        background: var(--verde);
        color: white;
        border: none;
        padding: 13px;
        border-radius: 12px;
        font-weight: 700;
        font-size: 13px;
        width: 100%;
        margin-top: 16px;
        display: block;
        text-decoration: none;
        text-align: center;
        box-sizing: border-box;
        transition: background .15s ease, transform .15s ease;
    }
    .btn-wa:hover { background: #15803d; transform: translateY(-1px); }

    .empty {
        text-align: center;
        color: #a0aec0;
        width: 100%;
        font-size: 14px;
        padding: 30px;
    }
</style>
</head>
<body>
    <div class="hero"><h1>GLADYS TRAVELTUR</h1><p>Tu próxima aventura comienza aquí</p></div>
    <div class="controles">
        <div class="campo">¿A dónde? <input type="text" id="bus-txt" onkeyup="filtrar()"></div>
        <div class="campo">Desde <input type="date" id="f-desde" onchange="filtrar()"></div>
        <div class="campo">Hasta <input type="date" id="f-hasta" onchange="filtrar()"></div>
        <div class="campo">Ordenar <select id="orden" onchange="filtrar()"><option value="prox">Próximos</option><option value="p-menor">Menor Precio</option></select></div>
        <button class="btn-bus" onclick="filtrar()">BUSCAR</button>
    </div>
    <h2 class="section-title">✈️ Paquetes Aéreos</h2><div class="container" id="aer"></div>
    <h2 class="section-title">🚌 Salidas en Micro</h2><div class="container" id="mic"></div>

    <script>
        const API = 'http://localhost:3000';
        const FOTO_DEFAULT = "https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=600";
        const fotos = { "bariloche": "Fondos/bariloche.jpg", "brasil": "Fondos/brasil.jpg", "carlos paz": "Fondos/carlospaz.jpg", "cataratas del iguazú": "Fondos/cataratas.jpg", "jujuy": "Fondos/jujuy.jpg", "mendoza": "Fondos/mendoza.jpg", "default": FOTO_DEFAULT };

        let cache = [];
        const norm = (t) => (t||"").normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase();

        async function cargar() {
            try {
                const res = await fetch(`${API}/admin/ranking`);
                const all = await res.json();
                cache = all.filter(v => v.activo && v.destinos); // Solo activos y con destino válido
                filtrar();
            } catch (e) { console.error(e); }
        }

        function filtrar() {
            const txt = norm(document.getElementById('bus-txt').value);
            const ord = document.getElementById('orden').value;
            const desde = document.getElementById('f-desde').value;
            const hasta = document.getElementById('f-hasta').value;

            let list = cache.filter(v => norm(v.destinos.nombre).includes(txt));
            if (desde) list = list.filter(v => v.fecha_salida >= desde);
            if (hasta) list = list.filter(v => v.fecha_salida <= hasta);
            if(ord === "p-menor") list.sort((a,b) => a.precio_total - b.precio_total);
            if(ord === "prox") list.sort((a,b) => new Date(a.fecha_salida) - new Date(b.fecha_salida));

            dibujar(list.filter(v => norm(v.tipo_viaje).includes('aer')), 'aer');
            dibujar(list.filter(v => !norm(v.tipo_viaje).includes('aer')), 'mic');
        }

        function imagenDe(v) {
            if (v.destinos.imagen_url) return v.destinos.imagen_url;
            return fotos[norm(v.destinos.nombre)] || FOTO_DEFAULT;
        }

        function dibujar(lista, id) {
            const cont = document.getElementById(id);
            cont.innerHTML = lista.length === 0 ? "<p class='empty'>No hay ofertas por el momento.</p>" : lista.map(v => `
                <div class="card">
                    <img src="${imagenDe(v)}" class="card-img" onerror="this.onerror=null;this.src='${FOTO_DEFAULT}'">
                    <div class="card-body">
                        <small style="color:var(--celeste);font-weight:800">SALIDA: ${v.fecha_salida.split('-').reverse().join('/')}</small>
                        <h3>${v.destinos.nombre}</h3>
                        <div class="empresa">${v.empresas ? v.empresas.nombre : ''}</div>
                        <div class="price">${v.moneda === 'USD' ? 'USD' : '$'} ${Number(v.precio_total).toLocaleString('es-AR')}</div>
                        <a href="https://wa.me/5491135592160?text=${encodeURIComponent('Hola Gladys! Consulto por ' + v.destinos.nombre)}" class="btn-wa" target="_blank">CONSULTAR</a>
                    </div>
                </div>`).join('');
        }
        window.onload = cargar;
    </script>
</body>
</html>
