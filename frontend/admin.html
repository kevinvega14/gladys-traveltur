<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestión Gladys Traveltur</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
    :root {
        --azul: #0d2c54;
        --celeste: #3182ce;
        --verde: #16a34a;
        --fondo: #f7f8fa;
        --borde: #eef0f3;
        --rojo: #e53e3e;
        --texto-sec: #6b7280;
        --sombra: 0 16px 40px -18px rgba(13,44,84,0.16);
    }

    * { box-sizing: border-box; }

    body {
        font-family: 'Inter', sans-serif;
        background: var(--fondo);
        margin: 0;
        padding: 24px;
        -webkit-font-smoothing: antialiased;
    }
    .badge-bonus {
    background: linear-gradient(135deg, #fef3c7, #fde68a);
    color: #92400e;
    font-size: 11px;
}
.texto-faltan {
    font-size: 12.5px;
    color: var(--texto-sec);
    font-weight: 600;
}
/* --- ESTILOS DEL RADAR DE BONOS --- */
.radar-alerta {
    background: linear-gradient(135deg, #fff7ed, #ffedd5);
    border: 1px solid #fed7aa;
    border-radius: 14px;
    padding: 16px 20px;
    margin-bottom: 24px;
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 13.5px;
    color: #9a3412;
}
.radar-alerta strong { font-weight: 800; }
.radar-alerta .pulso {
    width: 10px; height: 10px; border-radius: 50%;
    background: #f97316; flex-shrink: 0;
    animation: pulso-anim 1.4s infinite;
}
@keyframes pulso-anim {
    0% { box-shadow: 0 0 0 0 rgba(249,115,22,0.5); }
    70% { box-shadow: 0 0 0 8px rgba(249,115,22,0); }
    100% { box-shadow: 0 0 0 0 rgba(249,115,22,0); }
}
.tab-dot {
    display: inline-block; width: 7px; height: 7px; border-radius: 50%;
    background: #f97316; margin-left: 5px; animation: pulso-anim 1.4s infinite;
}
    .wrapper { max-width: 1100px; margin: auto; }

    h1 {
        text-align: center;
        color: var(--azul);
        font-weight: 900;
        letter-spacing: -0.01em;
        text-transform: uppercase;
        margin-bottom: 36px;
    }

    .topbar { display: flex; justify-content: flex-end; margin-bottom: 14px; }

    .tabs {
        display: flex;
        gap: 6px;
        border-bottom: 1px solid var(--borde);
        margin-bottom: 36px;
        flex-wrap: wrap;
    }
    .tab {
        padding: 13px 20px;
        cursor: pointer;
        font-weight: 700;
        background: none;
        border: none;
        color: var(--texto-sec);
        text-transform: uppercase;
        font-size: 11px;
        letter-spacing: 0.03em;
        border-radius: 10px 10px 0 0;
        border-bottom: 2px solid transparent;
        transition: color .15s ease, background .15s ease;
    }
    .tab:hover { color: var(--celeste); background: rgba(49,130,206,0.06); }
    .tab.active { color: var(--celeste); border-bottom: 2px solid var(--celeste); }

    .panel {
        background: white;
        padding: 36px;
        border-radius: 20px;
        border: 1px solid var(--borde);
        display: none;
        box-shadow: var(--sombra);
    }
    .panel.active { display: block; }
    .panel h2 { margin-top: 0; color: var(--azul); font-weight: 800; }

    .f-row { display: flex; gap: 18px; margin-bottom: 26px; flex-wrap: wrap; }
    .f-group { flex: 1; min-width: 160px; position: relative; }

    label {
        display: block;
        font-weight: 700;
        font-size: 10px;
        color: var(--texto-sec);
        text-transform: uppercase;
        margin-bottom: 8px;
        letter-spacing: 0.05em;
    }

    input, select, button {
        width: 100%;
        padding: 13px 14px;
        border-radius: 10px;
        border: 1px solid var(--borde);
        font-size: 14px;
        font-family: inherit;
        box-sizing: border-box;
        background: #fbfbfc;
        transition: border-color .15s ease, box-shadow .15s ease;
    }
    input:focus, select:focus {
        outline: none;
        border-color: var(--celeste);
        box-shadow: 0 0 0 3px rgba(49,130,206,0.15);
        background: white;
    }

    .btn-blue {
        background: var(--azul);
        color: white;
        border: none;
        font-weight: 800;
        cursor: pointer;
        padding: 16px;
        text-transform: uppercase;
        font-size: 12px;
        letter-spacing: 0.03em;
        border-radius: 12px;
        transition: background .15s ease, transform .15s ease;
    }
    .btn-blue:hover { background: var(--celeste); transform: translateY(-1px); }

    .btn-logout {
        background: white;
        color: var(--rojo);
        border: 1px solid #fecaca;
        font-weight: 700;
        cursor: pointer;
        padding: 9px 16px;
        text-transform: uppercase;
        font-size: 10px;
        letter-spacing: 0.03em;
        width: auto;
        border-radius: 8px;
        transition: background .15s ease;
    }
    .btn-logout:hover { background: #fef2f2; }

    /* ---------- Tablas ---------- */
    table {
        width: 100%;
        border-collapse: separate;
        border-spacing: 0;
        margin-top: 26px;
        border: 1px solid var(--borde);
        border-radius: 14px;
        overflow: hidden;
    }
    th {
        text-align: left;
        padding: 14px 18px;
        background: #fafbfc;
        font-size: 10px;
        letter-spacing: 0.05em;
        border-bottom: 1px solid var(--borde);
        text-transform: uppercase;
        color: var(--texto-sec);
        font-weight: 800;
    }
    td {
        padding: 15px 18px;
        border-bottom: 1px solid var(--borde);
        font-size: 13.5px;
        color: #1a202c;
    }
    tr:last-child td { border-bottom: none; }
    tbody tr:nth-child(even) { background: #fafbfc; }
    tbody tr:hover { background: #f3f6fb; }

    .btn-status {
        border: none;
        padding: 8px 13px;
        border-radius: 8px;
        cursor: pointer;
        font-weight: 700;
        font-size: 10px;
        letter-spacing: 0.02em;
        width: auto;
        margin-bottom: 5px;
        margin-right: 5px;
        transition: opacity .15s ease;
    }
    .btn-status:hover { opacity: 0.85; }
    .agotado { background: #fee2e2; color: #b91c1c; }
    .disponible { background: #dcfce7; color: #15803d; }

    .badge {
        padding: 5px 12px;
        border-radius: 20px;
        font-size: 10px;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 0.02em;
        display: inline-block;
    }
    .badge-completo { background: #dcfce7; color: #15803d; }
    .badge-parcial { background: #fef3c7; color: #92400e; }
    .badge-pendiente { background: #fee2e2; color: #b91c1c; }
    .badge-cancelada { background: #e5e7eb; color: #6b7280; text-decoration: line-through; }

    #sug-box {
        position: absolute;
        width: 100%;
        background: white;
        border: 1px solid var(--borde);
        border-radius: 12px;
        z-index: 100;
        max-height: 200px;
        overflow-y: auto;
        display: none;
        box-shadow: var(--sombra);
        margin-top: 6px;
    }
    .sug-item {
        padding: 12px 14px;
        cursor: pointer;
        border-bottom: 1px solid #f7fafc;
        font-size: 13px;
        transition: background .1s ease;
    }
    .sug-item:hover { background: #f3f6fb; }
    .sug-item:last-child { border-bottom: none; }

    /* ---------- Login ---------- */
    #login-screen {
        max-width: 380px;
        margin: 100px auto;
        background: white;
        padding: 44px;
        border-radius: 20px;
        box-shadow: var(--sombra);
        text-align: center;
        border: 1px solid var(--borde);
    }
    #login-screen h2 { color: var(--azul); margin-top: 0; }
    #login-error { color: var(--rojo); font-size: 13px; margin-top: 12px; min-height: 18px; font-weight: 600; }
    #app { display: none; }

    /* ---------- Dashboard de métricas ---------- */
    .metricas-grid { display: flex; gap: 18px; flex-wrap: wrap; margin-bottom: 30px; }
    .metrica-card {
        flex: 1;
        min-width: 220px;
        padding: 26px;
        border-radius: 16px;
        box-shadow: 0 10px 30px -14px rgba(13,44,84,0.18);
        border: 1px solid var(--borde);
    }
    .metrica-card:nth-child(1) { background: linear-gradient(135deg, #eaf2ff, #dbeafe); }
    .metrica-card:nth-child(2) { background: linear-gradient(135deg, #eafaf0, #dcfce7); }
    .metrica-card:nth-child(3) { background: linear-gradient(135deg, #f3ecff, #ede9fe); }
    .metrica-card .label {
        font-size: 11px;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        color: var(--azul);
        opacity: 0.75;
    }
    .metrica-card .valor {
        font-size: 30px;
        font-weight: 900;
        margin-top: 10px;
        color: var(--azul);
        letter-spacing: -0.02em;
    }
</style>
</head>
<body>

<div id="login-screen">
    <h2>🔒 Acceso Admin</h2>
    <p style="color:#718096;font-size:13px;">Ingresá la contraseña de administración</p>
    <div class="f-group"><input type="password" id="login-pass" placeholder="Contraseña"></div>
    <button class="btn-blue" style="margin-top:15px;" onclick="login()">INGRESAR</button>
    <div id="login-error"></div>
</div>

<div id="app">
<div class="wrapper">
    <div class="topbar"><button class="btn-logout" onclick="logout()">Cerrar sesión</button></div>
    <h1>Oficina Gladys Traveltur</h1>
    <div class="tabs">
        <button class="tab active" onclick="tab(0)">Cargar Viaje</button>
        <button class="tab" onclick="tab(1)">Clientes</button>
        <button class="tab" onclick="tab(2)">Ventas</button>
        <button class="tab" onclick="tab(3)">Reservas Hechas</button>
        <button class="tab" onclick="tab(4)">Control de Ventas</button>
    </div>

    <div class="panel active" id="p0">
        <h2>Nueva Oferta</h2>
        <div class="f-group"><label>Destino</label><input type="text" id="v-dest" placeholder="Ej: Mendoza"></div>
        <div class="f-row">
            <div class="f-group"><label>Empresa</label><input type="text" id="v-emp" placeholder="Amcabi, Travelar..." list="lista-empresas"><datalist id="lista-empresas"></datalist></div>
            <div class="f-group"><label>Transporte</label><select id="v-tipo"><option value="Micro">Micro</option><option value="Aereo">Aéreo</option></select></div>
            <div class="f-group"><label>Moneda</label><select id="v-mon"><option value="ARS">ARS</option><option value="USD">USD</option></select></div>
            <div class="f-group"><label>Monto</label><input type="number" id="v-pre"></div>
            <div class="f-group"><label>Fecha Salida</label><input type="date" id="v-fec"></div>
            <div class="f-group"><label>Fecha Regreso</label><input type="date" id="v-fec-vuelta"></div>
        </div>
        <div class="f-group" style="margin-bottom:30px;"><label>Imagen (URL, opcional)</label><input type="text" id="v-img" placeholder="https://..."></div>
        <button class="btn-blue" onclick="saveV()">PUBLICAR EN WEB</button>
        <div id="tab-viajes-admin"></div>
    </div>

    <div class="panel" id="p1">
        <h2>Registro de Clientes</h2>
        <div class="f-row"><div class="f-group"><label>Apellido</label><input type="text" id="c-ape"></div><div class="f-group"><label>Nombre</label><input type="text" id="c-nom"></div></div>
        <div class="f-row"><div class="f-group"><label>DNI</label><input type="text" id="c-dni"></div><div class="f-group"><label>Teléfono</label><input type="text" id="c-tel"></div></div>
        <button class="btn-blue" onclick="saveC()">GUARDAR CLIENTE</button>
        <div id="tab-cli"></div>
    </div>

    <div class="panel" id="p2">
        <h2>Registrar Nueva Venta</h2>
        <div class="f-group"><label>1. Buscar Cliente</label><input type="text" id="r-bus" onkeyup="searchC()"><div id="sug-box"></div><input type="hidden" id="r-id-c"></div>
        <div class="f-group"><label>2. Destino</label><select id="r-via" onchange="updPrice()"></select></div>
        <div class="f-row">
            <div class="f-group"><label>Pax</label><input type="number" id="r-can" value="1" onchange="updPrice()"></div>
            <div class="f-group"><label>Total</label><input type="number" id="r-tot"></div>
            <div class="f-group"><label>Seña / Pagado</label><input type="number" id="r-pag" value="0"></div>
        </div>
        <button class="btn-blue" onclick="saveR()">CONFIRMAR VENTA</button>
    </div>

    <div class="panel" id="p3">
    <h2>Reservas Realizadas</h2>
    <div class="f-group" style="max-width:350px; margin-bottom:20px;">
        <input type="text" id="buscar-cliente" placeholder="🔍 Buscar por apellido de cliente...">
    </div>
    <div id="tab-his"></div>
</div>
    <div class="panel" id="p4">
    <h2>Control de Ventas</h2>
    <div class="metricas-grid" id="metricas-grid"></div>
    <div id="tab-ran"></div>
</div>
</div>
</div>

<script>
    const API = "http://localhost:4000";
    let cliCache = [], viaCache = [];
    let todasLasReservas = [];

    // -------------------- AUTH --------------------
    function getToken() { return sessionStorage.getItem('admin_token'); }

    function checkAuth() {
        if (getToken()) {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('app').style.display = 'block';
            tab(0);
        } else {
            document.getElementById('login-screen').style.display = 'block';
            document.getElementById('app').style.display = 'none';
        }
    }

    async function login() {
        const pass = document.getElementById('login-pass').value;
        const errBox = document.getElementById('login-error');
        errBox.innerText = '';
        try {
            const res = await fetch(`${API}/admin/login`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ password: pass }) });
            const data = await res.json();
            if (!res.ok) { errBox.innerText = data.error || 'Error al iniciar sesión'; return; }
            sessionStorage.setItem('admin_token', data.token);
            checkAuth();
        } catch (e) { errBox.innerText = 'No se pudo conectar con el servidor'; }
    }

    function logout() { sessionStorage.removeItem('admin_token'); checkAuth(); }

    // Wrapper de fetch que agrega el token para rutas protegidas (POST/PUT/DELETE)
    async function authFetch(url, opts = {}) {
        opts.headers = { ...(opts.headers || {}), 'x-admin-token': getToken() };
        const res = await fetch(url, opts);
        if (res.status === 401) { logout(); throw new Error('Sesión expirada'); }
        return res;
    }

    // -------------------- TABS --------------------
    function tab(n) {
        document.querySelectorAll('.tab').forEach((b,i) => b.classList.toggle('active', i==n));
        document.querySelectorAll('.panel').forEach((p,i) => p.classList.toggle('active', i==n));
        if(n==0) { getVAdmin(); getEmpresas(); }
        if(n==1) getC();
        if(n==2) { getCCache(); getV(); }
        if(n==3) getH();
        if(n==4) getR();
    }

    async function getEmpresas() {
        const res = await fetch(`${API}/admin/empresas`);
        const data = await res.json();
        document.getElementById('lista-empresas').innerHTML = data.map(e => `<option value="${e.nombre}">`).join('');
    }

    async function saveV() {
        const body = {
            destino: document.getElementById('v-dest').value,
            empresa: document.getElementById('v-emp').value,
            tipo: document.getElementById('v-tipo').value,
            moneda: document.getElementById('v-mon').value,
            precio: document.getElementById('v-pre').value,
            fecha: document.getElementById('v-fec').value,
            fecha_regreso: document.getElementById('v-fec-vuelta').value,
            imagen_url: document.getElementById('v-img').value
        };
        if (!body.destino || !body.precio || !body.fecha) { alert('Completá destino, monto y fecha de salida'); return; }
        const res = await authFetch(`${API}/admin/nuevo-viaje`, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body) });
        const data = await res.json();
        if(res.ok) { alert("¡Publicado!"); getVAdmin(); }
        else alert('Error: ' + data.error);
    }

    async function getVAdmin() {
        const res = await fetch(`${API}/admin/ranking`);
        const data = await res.json();
        let h = `<table><tr><th>Destino</th><th>Empresa</th><th>Fecha</th><th>Vendidos</th><th>Acciones</th></tr>`;
        data.forEach(v => {
            h += `<tr><td><b>${v.destinos ? v.destinos.nombre : 'N/D'}</b></td><td>${v.empresas ? v.empresas.nombre : 'N/D'}</td><td>${v.fecha_salida}</td><td>${v.vendidos || 0}</td>
            <td>
                <button class="btn-status ${v.activo?'disponible':'agotado'}" onclick="toggleV(${v.id_salida}, ${!v.activo})">${v.activo?'AGOTAR':'ACTIVAR'}</button>
                <button class="btn-status agotado" onclick="deleteV(${v.id_salida})">ELIMINAR</button>
            </td></tr>`;
        });
        document.getElementById('tab-viajes-admin').innerHTML = h + "</table>";
    }

    async function deleteV(id) {
        if(confirm("¿Eliminar viaje y sus reservas?")) {
            await authFetch(`${API}/admin/eliminar-viaje/${id}`, { method: 'DELETE' });
            getVAdmin();
        }
    }

    async function toggleV(id, st) {
        await authFetch(`${API}/admin/toggle-viaje/${id}`, { method: 'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ estado: st }) });
        getVAdmin();
    }

    async function getV() {
        const res = await fetch(`${API}/admin/ranking`);
        viaCache = await res.json();
        const sel = document.getElementById('r-via'); sel.innerHTML = '<option value="">-- Seleccionar --</option>';
        viaCache.filter(v => v.activo).forEach(v => { sel.innerHTML += `<option value="${v.id_salida}">${v.destinos ? v.destinos.nombre : 'N/D'} (${v.fecha_salida})</option>`; });
    }

    function updPrice() {
        const v = viaCache.find(x => x.id_salida == document.getElementById('r-via').value);
        if(v) document.getElementById('r-tot').value = v.precio_total * (document.getElementById('r-can').value || 1);
    }

    async function saveR() {
        if (!document.getElementById('r-id-c').value) { alert('Seleccioná un cliente de la lista de sugerencias'); return; }
        if (!document.getElementById('r-via').value) { alert('Seleccioná un destino'); return; }
        const body = {
            id_cliente: document.getElementById('r-id-c').value,
            id_salida: document.getElementById('r-via').value,
            cantidad_pasajeros: document.getElementById('r-can').value,
            monto_total: document.getElementById('r-tot').value,
            monto_pagado: document.getElementById('r-pag').value
        };
        const res = await authFetch(`${API}/admin/nueva-reserva`, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body) });
        const data = await res.json();
        if (res.ok) { alert("Reserva Guardada"); tab(3); } else alert('Error: ' + data.error);
    }

    async function getC() {
        const res = await fetch(`${API}/admin/clientes`);
        const data = await res.json();
        let h = `<table><tr><th>Apellido</th><th>Nombre</th><th>DNI</th></tr>`;
        data.forEach(c => h+=`<tr><td><b>${(c.apellido||'').toUpperCase()}</b></td><td>${c.nombre||''}</td><td>${c.dni||''}</td></tr>`);
        document.getElementById('tab-cli').innerHTML = h+"</table>";
    }

    async function saveC() {
        if (!document.getElementById('c-ape').value || !document.getElementById('c-dni').value) { alert('Apellido y DNI son obligatorios'); return; }
        const res = await authFetch(`${API}/admin/nuevo-cliente`, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({apellido:document.getElementById('c-ape').value, nombre:document.getElementById('c-nom').value, dni:document.getElementById('c-dni').value, telefono:document.getElementById('c-tel').value}) });
        const data = await res.json();
        if (res.ok) { document.getElementById('c-ape').value=''; document.getElementById('c-nom').value=''; document.getElementById('c-dni').value=''; document.getElementById('c-tel').value=''; getC(); }
        else alert('Error: ' + data.error);
    }

    async function getCCache() { const res = await fetch(`${API}/admin/clientes`); cliCache = await res.json(); }

    function searchC() {
        const t = document.getElementById('r-bus').value.toLowerCase();
        const sug = document.getElementById('sug-box'); sug.innerHTML = "";
        if(t.length < 2) { sug.style.display="none"; return; }
        const f = cliCache.filter(c => (c.apellido||'').toLowerCase().includes(t) || (c.dni||'').includes(t));
        if(f.length > 0) {
            sug.style.display="block";
            f.forEach(c => {
                const d = document.createElement('div'); d.className="sug-item"; d.innerText = `${(c.apellido||'').toUpperCase()}, ${c.nombre||''}`;
                d.onclick = () => { document.getElementById('r-id-c').value = c.id_cliente; document.getElementById('r-bus').value = (c.apellido||'').toUpperCase(); sug.style.display="none"; };
                sug.appendChild(d);
            });
        } else sug.style.display="none";
    }
function formatMonto(valor) {
    if (valor === null || valor === undefined || valor === '') return '$0';
    const num = Number(valor);
    if (isNaN(num)) return '$0';
    return '$' + num.toLocaleString('es-AR');
}
    function badgeEstadoPago(estado_pago, estado) {
        if (estado === 'Cancelada') return `<span class="badge badge-cancelada">Cancelada</span>`;
        const map = { Completo: 'badge-completo', Parcial: 'badge-parcial', Pendiente: 'badge-pendiente' };
        return `<span class="badge ${map[estado_pago]||'badge-pendiente'}">${estado_pago||'Pendiente'}</span>`;
    }

    async function getH() {
        const res = await fetch(`${API}/admin/historial-reservas`);
        todasLasReservas = await res.json();
        document.getElementById('buscar-cliente').value = '';
        renderHistorial(todasLasReservas);
    }

    async function cancelarR(id) {
        if(confirm("¿Cancelar esta reserva?")) {
            await authFetch(`${API}/admin/reservas/${id}/cancelar`, { method: 'PUT' });
            getH();
        }
    }
function renderHistorial(data) {
    let h = `<table><tr><th>Cliente</th><th>Destino</th><th>Pagado</th><th>Total</th><th>Estado</th><th>Acciones</th></tr>`;
    if (data.length === 0) {
        h += `<tr><td colspan="6" style="text-align:center;color:#a0aec0;">No se encontraron reservas.</td></tr>`;
    } else {
        data.forEach(r => {
            const destinoNombre = r.salidas && r.salidas.destinos ? r.salidas.destinos.nombre : 'N/D';
            h += `<tr><td>${r.clientes ? r.clientes.apellido : 'N/D'}</td><td>${destinoNombre}</td><td>${formatMonto(r.monto_pagado)}</td><td>${formatMonto(r.monto_total)}</td>
            <td>${badgeEstadoPago(r.estado_pago, r.estado)}</td>
            <td>${r.estado === 'Cancelada' ? '-' : `<button class="btn-status agotado" onclick="cancelarR(${r.id_reserva})">CANCELAR</button>`}</td></tr>`;
        });
    }
    document.getElementById('tab-his').innerHTML = h+"</table>";
}

function filtrarReservas() {
    const texto = document.getElementById('buscar-cliente').value.trim().toLowerCase();
    if (!texto) { renderHistorial(todasLasReservas); return; }

    const filtradas = todasLasReservas.filter(r =>
        r.clientes && r.clientes.apellido && r.clientes.apellido.toLowerCase().includes(texto)
    );
    renderHistorial(filtradas);
}

function calcularMetricas(dataReservas) {
    let totalRecaudado = 0;
    let reservasActivas = 0;
    const conteoDestinos = {};

    dataReservas.forEach(r => {
        const activa = r.estado !== 'Cancelada';
        if (!activa) return;

        totalRecaudado += Number(r.monto_pagado) || 0;
        reservasActivas++;

        const destino = r.salidas && r.salidas.destinos ? r.salidas.destinos.nombre : null;
        if (destino) conteoDestinos[destino] = (conteoDestinos[destino] || 0) + 1;
    });

    let destinoEstrella = '—';
    let maxCount = 0;
    for (const [destino, count] of Object.entries(conteoDestinos)) {
        if (count > maxCount) { maxCount = count; destinoEstrella = destino; }
    }

    return { totalRecaudado, reservasActivas, destinoEstrella };
}

function renderMetricas({ totalRecaudado, reservasActivas, destinoEstrella }) {
    document.getElementById('metricas-grid').innerHTML = `
        <div class="metrica-card">
            <div class="label">💰 Total Recaudado</div>
            <div class="valor">${formatMonto(totalRecaudado)}</div>
        </div>
        <div class="metrica-card">
            <div class="label">📋 Reservas Activas</div>
            <div class="valor">${reservasActivas}</div>
        </div>
        <div class="metrica-card">
            <div class="label">⭐ Destino Estrella</div>
            <div class="valor">${destinoEstrella}</div>
        </div>
    `;
}
const META_BONUS = 12;
function calcularBonificaciones(dataReservas) {
    const grupos = {};

    dataReservas.forEach(r => {
        if (r.estado === 'Cancelada') return; // no cuenta para el bonus

        const destino = r.salidas && r.salidas.destinos ? r.salidas.destinos.nombre : null;
        const empresa = r.salidas && r.salidas.empresas ? r.salidas.empresas.nombre : null;
        if (!destino || !empresa) return;

        const key = `${empresa}|||${destino}`;
        if (!grupos[key]) grupos[key] = { empresa, destino, vendidos: 0 };
        grupos[key].vendidos += Number(r.cantidad_pasajeros) || 0;
    });

    return Object.values(grupos)
        .map(g => ({
            ...g,
            bonusGanado: g.vendidos >= META_BONUS,
            faltan: Math.max(0, META_BONUS - g.vendidos)
        }))
        .sort((a, b) => b.vendidos - a.vendidos);
}

function renderTablaVentas(bonificaciones) {
    const radarHtml = renderRadarBonos(calcularRadarBonos(bonificaciones));

    let h = radarHtml + `<table><tr><th>Destino</th><th>Empresa</th><th>PAX Vendidos</th><th>Bonificación</th></tr>`;
    if (bonificaciones.length === 0) {
        h += `<tr><td colspan="4" style="text-align:center;color:#a0aec0;">Todavía no hay ventas registradas.</td></tr>`;
    } else {
        bonificaciones.forEach(g => {
            const celdaBonus = g.bonusGanado
                ? `<span class="badge badge-bonus">🎉 ¡BONUS GANADO!</span>`
                : `<span class="texto-faltan">Faltan ${g.faltan} para el Bonus</span>`;
            h += `<tr><td>${g.destino}</td><td>${g.empresa}</td><td>${g.vendidos} PAX</td><td>${celdaBonus}</td></tr>`;
        });
    }
    document.getElementById('tab-ran').innerHTML = h + "</table>";
}

async function getR() {
    const res = await fetch(`${API}/admin/historial-reservas`);
    const dataHistorial = await res.json();

    renderMetricas(calcularMetricas(dataHistorial));
    renderTablaVentas(calcularBonificaciones(dataHistorial)); // ya arma el radar internamente
}

    document.getElementById('login-pass').addEventListener('keyup', e => { if(e.key === 'Enter') login(); });
    window.onload = checkAuth;
    if (document.getElementById('buscar-cliente')) {
    document.getElementById('buscar-cliente').addEventListener('input', filtrarReservas);
}

function calcularRadarBonos(bonificaciones) {
    return bonificaciones.filter(g => !g.bonusGanado && g.faltan <= 2);
}

function renderRadarBonos(alertas) {
    const tabBtn = document.querySelectorAll('.tab')[4]; // Ajustá el número si no es la 5ta pestaña
    const dotViejo = tabBtn ? tabBtn.querySelector('.tab-dot') : null;
    if (dotViejo) dotViejo.remove();

    if (alertas.length === 0) return '';
    if (tabBtn) tabBtn.insertAdjacentHTML('beforeend', '<span class="tab-dot"></span>');

    return alertas.map(a => `
        <div class="radar-alerta">
            <span class="pulso"></span>
            <span>🎯 <strong>${a.empresa} – ${a.destino}</strong> está a <strong>${a.faltan} PAX</strong> del bonus (lleva ${a.vendidos}/12). ¡Empujalo!</span>
        </div>
    `).join('');
}
