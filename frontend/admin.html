<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestión Gladys Traveltur</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --azul: #0d2c54; --celeste: #3182ce; --gris: #f7fafc; --borde: #e2e8f0; --rojo: #e53e3e; --verde: #2f855a; }
        body { font-family: 'Inter', sans-serif; background: var(--gris); margin: 0; padding: 20px; }
        .wrapper { max-width: 1100px; margin: auto; }
        h1 { text-align: center; color: var(--azul); font-weight: 800; text-transform: uppercase; margin-bottom: 40px; }
        .tabs { display: flex; gap: 10px; border-bottom: 2px solid var(--borde); margin-bottom: 40px; flex-wrap: wrap; }
        .tab { padding: 15px 25px; cursor: pointer; font-weight: 700; background: none; border: none; color: #718096; text-transform: uppercase; font-size: 12px; border-bottom: 2px solid transparent; }
        .tab.active { color: var(--celeste); border-bottom: 2px solid var(--celeste); }
        .panel { background: white; padding: 45px; border-radius: 15px; border: 1px solid var(--borde); display: none; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .panel.active { display: block; }
        .f-row { display: flex; gap: 20px; margin-bottom: 30px; flex-wrap: wrap; }
        .f-group { flex: 1; min-width: 150px; position: relative; }
        label { display: block; font-weight: 700; font-size: 10px; color: #4a5568; text-transform: uppercase; margin-bottom: 8px; letter-spacing: 0.5px; }
        input, select, button { width: 100%; padding: 14px; border-radius: 8px; border: 1px solid var(--borde); font-size: 14px; box-sizing: border-box; }
        .btn-blue { background: var(--celeste); color: white; border: none; font-weight: 800; cursor: pointer; padding: 18px; text-transform: uppercase; }
        .btn-logout { background: var(--rojo); color: white; border: none; font-weight: 700; cursor: pointer; padding: 10px 16px; text-transform: uppercase; font-size: 11px; width: auto; border-radius: 6px; }
        table { width: 100%; border-collapse: collapse; margin-top: 30px; }
        th { text-align: left; padding: 16px; background: #f8fafc; font-size: 11px; border-bottom: 2px solid var(--borde); text-transform: uppercase; color: #718096; }
        td { padding: 16px; border-bottom: 1px solid var(--borde); font-size: 14px; }
        .btn-status { border: none; padding: 8px 12px; border-radius: 6px; cursor: pointer; font-weight: 700; font-size: 10px; width: auto; margin-bottom: 5px; margin-right: 5px; }
        .agotado { background: #fed7d7; color: #9b2c2c; }
        .disponible { background: #c6f6d5; color: #22543d; }
        .badge { padding: 4px 10px; border-radius: 20px; font-size: 10px; font-weight: 800; text-transform: uppercase; }
        .badge-completo { background: #c6f6d5; color: #22543d; }
        .badge-parcial { background: #feebc8; color: #7b341e; }
        .badge-pendiente { background: #fed7d7; color: #9b2c2c; }
        .badge-cancelada { background: #e2e8f0; color: #4a5568; text-decoration: line-through; }
        #sug-box { position: absolute; width: 100%; background: white; border: 1px solid var(--borde); z-index: 100; max-height: 200px; overflow-y: auto; display: none; box-shadow: 0 10px 15px rgba(0,0,0,0.1); }
        .sug-item { padding: 12px; cursor: pointer; border-bottom: 1px solid #f7fafc; }
        .topbar { display: flex; justify-content: flex-end; margin-bottom: 10px; }
        #login-screen { max-width: 380px; margin: 100px auto; background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; }
        #login-screen h2 { color: var(--azul); }
        #login-error { color: var(--rojo); font-size: 13px; margin-top: 10px; min-height: 18px; }
        #app { display: none; }
    </style>
</head>
<body>

<div id="login-screen">
    <h2>🔒 Acceso Admin</h2>
    <p style="color:#718096;font-size:13px;">Ingresá la contraseña de administración</p>
    <div class="f-group"><input type="password" id="login-pass" placeholder="Contraseña"></div>
    <button class="btn-blue" style="margin-top:15px;" onclick="login()">INGRESAR</button>
    <div id="login-error"></div>
</div>

<div id="app">
<div class="wrapper">
    <div class="topbar"><button class="btn-logout" onclick="logout()">Cerrar sesión</button></div>
    <h1>Oficina Gladys Traveltur</h1>
    <div class="tabs">
        <button class="tab active" onclick="tab(0)">Cargar Viaje</button>
        <button class="tab" onclick="tab(1)">Clientes</button>
        <button class="tab" onclick="tab(2)">Ventas</button>
        <button class="tab" onclick="tab(3)">Reservas Hechas</button>
        <button class="tab" onclick="tab(4)">Control de Ventas</button>
    </div>

    <div class="panel active" id="p0">
        <h2>Nueva Oferta</h2>
        <div class="f-group"><label>Destino</label><input type="text" id="v-dest" placeholder="Ej: Mendoza"></div>
        <div class="f-row">
            <div class="f-group"><label>Empresa</label><input type="text" id="v-emp" placeholder="Amcabi, Travelar..." list="lista-empresas"><datalist id="lista-empresas"></datalist></div>
            <div class="f-group"><label>Transporte</label><select id="v-tipo"><option value="Micro">Micro</option><option value="Aereo">Aéreo</option></select></div>
            <div class="f-group"><label>Moneda</label><select id="v-mon"><option value="ARS">ARS</option><option value="USD">USD</option></select></div>
            <div class="f-group"><label>Monto</label><input type="number" id="v-pre"></div>
            <div class="f-group"><label>Fecha Salida</label><input type="date" id="v-fec"></div>
            <div class="f-group"><label>Fecha Regreso</label><input type="date" id="v-fec-vuelta"></div>
        </div>
        <div class="f-group" style="margin-bottom:30px;"><label>Imagen (URL, opcional)</label><input type="text" id="v-img" placeholder="https://..."></div>
        <button class="btn-blue" onclick="saveV()">PUBLICAR EN WEB</button>
        <div id="tab-viajes-admin"></div>
    </div>

    <div class="panel" id="p1">
        <h2>Registro de Clientes</h2>
        <div class="f-row"><div class="f-group"><label>Apellido</label><input type="text" id="c-ape"></div><div class="f-group"><label>Nombre</label><input type="text" id="c-nom"></div></div>
        <div class="f-row"><div class="f-group"><label>DNI</label><input type="text" id="c-dni"></div><div class="f-group"><label>Teléfono</label><input type="text" id="c-tel"></div></div>
        <button class="btn-blue" onclick="saveC()">GUARDAR CLIENTE</button>
        <div id="tab-cli"></div>
    </div>

    <div class="panel" id="p2">
        <h2>Registrar Nueva Venta</h2>
        <div class="f-group"><label>1. Buscar Cliente</label><input type="text" id="r-bus" onkeyup="searchC()"><div id="sug-box"></div><input type="hidden" id="r-id-c"></div>
        <div class="f-group"><label>2. Destino</label><select id="r-via" onchange="updPrice()"></select></div>
        <div class="f-row">
            <div class="f-group"><label>Pax</label><input type="number" id="r-can" value="1" onchange="updPrice()"></div>
            <div class="f-group"><label>Total</label><input type="number" id="r-tot"></div>
            <div class="f-group"><label>Seña / Pagado</label><input type="number" id="r-pag" value="0"></div>
        </div>
        <button class="btn-blue" onclick="saveR()">CONFIRMAR VENTA</button>
    </div>

    <div class="panel" id="p3"><h2>Reservas Realizadas</h2><div id="tab-his"></div></div>
    <div class="panel" id="p4"><h2>Control de Ventas</h2><div id="tab-ran"></div></div>
</div>
</div>

<script>
    const API = "http://localhost:3000";
    let cliCache = [], viaCache = [];

    // -------------------- AUTH --------------------
    function getToken() { return sessionStorage.getItem('admin_token'); }

    function checkAuth() {
        if (getToken()) {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('app').style.display = 'block';
            tab(0);
        } else {
            document.getElementById('login-screen').style.display = 'block';
            document.getElementById('app').style.display = 'none';
        }
    }

    async function login() {
        const pass = document.getElementById('login-pass').value;
        const errBox = document.getElementById('login-error');
        errBox.innerText = '';
        try {
            const res = await fetch(`${API}/admin/login`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ password: pass }) });
            const data = await res.json();
            if (!res.ok) { errBox.innerText = data.error || 'Error al iniciar sesión'; return; }
            sessionStorage.setItem('admin_token', data.token);
            checkAuth();
        } catch (e) { errBox.innerText = 'No se pudo conectar con el servidor'; }
    }

    function logout() { sessionStorage.removeItem('admin_token'); checkAuth(); }

    // Wrapper de fetch que agrega el token para rutas protegidas (POST/PUT/DELETE)
    async function authFetch(url, opts = {}) {
        opts.headers = { ...(opts.headers || {}), 'x-admin-token': getToken() };
        const res = await fetch(url, opts);
        if (res.status === 401) { logout(); throw new Error('Sesión expirada'); }
        return res;
    }

    // -------------------- TABS --------------------
    function tab(n) {
        document.querySelectorAll('.tab').forEach((b,i) => b.classList.toggle('active', i==n));
        document.querySelectorAll('.panel').forEach((p,i) => p.classList.toggle('active', i==n));
        if(n==0) { getVAdmin(); getEmpresas(); }
        if(n==1) getC();
        if(n==2) { getCCache(); getV(); }
        if(n==3) getH();
        if(n==4) getR();
    }

    async function getEmpresas() {
        const res = await fetch(`${API}/admin/empresas`);
        const data = await res.json();
        document.getElementById('lista-empresas').innerHTML = data.map(e => `<option value="${e.nombre}">`).join('');
    }

    async function saveV() {
        const body = {
            destino: document.getElementById('v-dest').value,
            empresa: document.getElementById('v-emp').value,
            tipo: document.getElementById('v-tipo').value,
            moneda: document.getElementById('v-mon').value,
            precio: document.getElementById('v-pre').value,
            fecha: document.getElementById('v-fec').value,
            fecha_regreso: document.getElementById('v-fec-vuelta').value,
            imagen_url: document.getElementById('v-img').value
        };
        if (!body.destino || !body.precio || !body.fecha) { alert('Completá destino, monto y fecha de salida'); return; }
        const res = await authFetch(`${API}/admin/nuevo-viaje`, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body) });
        const data = await res.json();
        if(res.ok) { alert("¡Publicado!"); getVAdmin(); }
        else alert('Error: ' + data.error);
    }

    async function getVAdmin() {
        const res = await fetch(`${API}/admin/ranking`);
        const data = await res.json();
        let h = `<table><tr><th>Destino</th><th>Empresa</th><th>Fecha</th><th>Vendidos</th><th>Acciones</th></tr>`;
        data.forEach(v => {
            h += `<tr><td><b>${v.destinos ? v.destinos.nombre : 'N/D'}</b></td><td>${v.empresas ? v.empresas.nombre : 'N/D'}</td><td>${v.fecha_salida}</td><td>${v.vendidos || 0}</td>
            <td>
                <button class="btn-status ${v.activo?'disponible':'agotado'}" onclick="toggleV(${v.id_salida}, ${!v.activo})">${v.activo?'AGOTAR':'ACTIVAR'}</button>
                <button class="btn-status agotado" onclick="deleteV(${v.id_salida})">ELIMINAR</button>
            </td></tr>`;
        });
        document.getElementById('tab-viajes-admin').innerHTML = h + "</table>";
    }

    async function deleteV(id) {
        if(confirm("¿Eliminar viaje y sus reservas?")) {
            await authFetch(`${API}/admin/eliminar-viaje/${id}`, { method: 'DELETE' });
            getVAdmin();
        }
    }

    async function toggleV(id, st) {
        await authFetch(`${API}/admin/toggle-viaje/${id}`, { method: 'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ estado: st }) });
        getVAdmin();
    }

    async function getV() {
        const res = await fetch(`${API}/admin/ranking`);
        viaCache = await res.json();
        const sel = document.getElementById('r-via'); sel.innerHTML = '<option value="">-- Seleccionar --</option>';
        viaCache.filter(v => v.activo).forEach(v => { sel.innerHTML += `<option value="${v.id_salida}">${v.destinos ? v.destinos.nombre : 'N/D'} (${v.fecha_salida})</option>`; });
    }

    function updPrice() {
        const v = viaCache.find(x => x.id_salida == document.getElementById('r-via').value);
        if(v) document.getElementById('r-tot').value = v.precio_total * (document.getElementById('r-can').value || 1);
    }

    async function saveR() {
        if (!document.getElementById('r-id-c').value) { alert('Seleccioná un cliente de la lista de sugerencias'); return; }
        if (!document.getElementById('r-via').value) { alert('Seleccioná un destino'); return; }
        const body = {
            id_cliente: document.getElementById('r-id-c').value,
            id_salida: document.getElementById('r-via').value,
            cantidad_pasajeros: document.getElementById('r-can').value,
            monto_total: document.getElementById('r-tot').value,
            monto_pagado: document.getElementById('r-pag').value
        };
        const res = await authFetch(`${API}/admin/nueva-reserva`, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body) });
        const data = await res.json();
        if (res.ok) { alert("Reserva Guardada"); tab(3); } else alert('Error: ' + data.error);
    }

    async function getC() {
        const res = await fetch(`${API}/admin/clientes`);
        const data = await res.json();
        let h = `<table><tr><th>Apellido</th><th>Nombre</th><th>DNI</th></tr>`;
        data.forEach(c => h+=`<tr><td><b>${(c.apellido||'').toUpperCase()}</b></td><td>${c.nombre||''}</td><td>${c.dni||''}</td></tr>`);
        document.getElementById('tab-cli').innerHTML = h+"</table>";
    }

    async function saveC() {
        if (!document.getElementById('c-ape').value || !document.getElementById('c-dni').value) { alert('Apellido y DNI son obligatorios'); return; }
        const res = await authFetch(`${API}/admin/nuevo-cliente`, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({apellido:document.getElementById('c-ape').value, nombre:document.getElementById('c-nom').value, dni:document.getElementById('c-dni').value, telefono:document.getElementById('c-tel').value}) });
        const data = await res.json();
        if (res.ok) { document.getElementById('c-ape').value=''; document.getElementById('c-nom').value=''; document.getElementById('c-dni').value=''; document.getElementById('c-tel').value=''; getC(); }
        else alert('Error: ' + data.error);
    }

    async function getCCache() { const res = await fetch(`${API}/admin/clientes`); cliCache = await res.json(); }

    function searchC() {
        const t = document.getElementById('r-bus').value.toLowerCase();
        const sug = document.getElementById('sug-box'); sug.innerHTML = "";
        if(t.length < 2) { sug.style.display="none"; return; }
        const f = cliCache.filter(c => (c.apellido||'').toLowerCase().includes(t) || (c.dni||'').includes(t));
        if(f.length > 0) {
            sug.style.display="block";
            f.forEach(c => {
                const d = document.createElement('div'); d.className="sug-item"; d.innerText = `${(c.apellido||'').toUpperCase()}, ${c.nombre||''}`;
                d.onclick = () => { document.getElementById('r-id-c').value = c.id_cliente; document.getElementById('r-bus').value = (c.apellido||'').toUpperCase(); sug.style.display="none"; };
                sug.appendChild(d);
            });
        } else sug.style.display="none";
    }

    function badgeEstadoPago(estado_pago, estado) {
        if (estado === 'Cancelada') return `<span class="badge badge-cancelada">Cancelada</span>`;
        const map = { Completo: 'badge-completo', Parcial: 'badge-parcial', Pendiente: 'badge-pendiente' };
        return `<span class="badge ${map[estado_pago]||'badge-pendiente'}">${estado_pago||'Pendiente'}</span>`;
    }

    async function getH() {
        const res = await fetch(`${API}/admin/historial-reservas`);
        const data = await res.json();
        let h = `<table><tr><th>Cliente</th><th>Destino</th><th>Pagado</th><th>Total</th><th>Estado</th><th>Acciones</th></tr>`;
        data.forEach(r => {
            const destinoNombre = r.salidas && r.salidas.destinos ? r.salidas.destinos.nombre : 'N/D';
            h += `<tr><td>${r.clientes ? r.clientes.apellido : 'N/D'}</td><td>${destinoNombre}</td><td>$${r.monto_pagado}</td><td>$${r.monto_total}</td>
            <td>${badgeEstadoPago(r.estado_pago, r.estado)}</td>
            <td>${r.estado === 'Cancelada' ? '-' : `<button class="btn-status agotado" onclick="cancelarR(${r.id_reserva})">CANCELAR</button>`}</td></tr>`;
        });
        document.getElementById('tab-his').innerHTML = h+"</table>";
    }

    async function cancelarR(id) {
        if(confirm("¿Cancelar esta reserva?")) {
            await authFetch(`${API}/admin/reservas/${id}/cancelar`, { method: 'PUT' });
            getH();
        }
    }

    async function getR() {
        const res = await fetch(`${API}/admin/ranking-ventas`);
        const data = await res.json();
        let h = `<table><tr><th>Destino</th><th>Empresa</th><th>Vendidos</th><th>Bonificación</th></tr>`;
        data.forEach(v => h+=`<tr><td>${v.destino}</td><td>${v.empresa}</td><td>${v.vendidos} PAX</td><td>${v.gratis} GRATIS (faltan ${v.falta})</td></tr>`);
        document.getElementById('tab-ran').innerHTML = h+"</table>";
    }

    document.getElementById('login-pass').addEventListener('keyup', e => { if(e.key === 'Enter') login(); });
    window.onload = checkAuth;
</script>
</body>
</html>
